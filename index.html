<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Game with Screen Scroll</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; }
        #gameCanvas { background-color: #87CEEB; display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const TARGET_FPS = 60;
        const FRAME_TIME = 1000 / TARGET_FPS;

        // Game settings tuned for 30 updates/sec
        const gravity = 0.5;
        const friction = 0.8;
        const baseJump = -10;

        // Player
        let player = {
            x: canvas.width / 2,
            y: canvas.height - 150,
            width: 20,
            height: 20,
            speed: 5,
            velX: 0,
            velY: 0,
            jumping: false
        };

        // Platforms
        let platforms = [];
        for (let i = 0; i < 10; i++) {
            platforms.push({
                x: Math.random() * (canvas.width - 100),
                y: canvas.height - (100 * i) - 50,
                width: 100,
                height: 10
            });
        }

        // Key Listener
        let keys = [];
        window.addEventListener('keydown', function(e) {
            keys[e.keyCode] = true;
            if (e.keyCode === 32 && !player.jumping) {
                player.jumping = true;
                player.velY = baseJump - Math.abs(player.velX);
            }
        });

        window.addEventListener('keyup', function(e) {
            keys[e.keyCode] = false;
        });

        function updateGame() {
            // Horizontal movement input
            if (keys[39]) { // right
                if (player.velX < player.speed) {
                    player.velX += 1;
                }
            }

            if (keys[37]) { // left
                if (player.velX > -player.speed) {
                    player.velX -= 1;
                }
            }

            player.velX *= friction;
            player.velY += gravity;

            player.x += player.velX;
            player.y += player.velY;

            // Screen scroll
            if (player.y < canvas.height / 4) {
                const scrollAmount = Math.abs(player.velY);
                player.y += scrollAmount;

                platforms.forEach(platform => {
                    platform.y += scrollAmount;

                    if (platform.y > canvas.height) {
                        platform.y = 0;
                        platform.x = Math.random() * (canvas.width - platform.width);
                    }
                });
            }

            // Canvas edges
            if (player.x >= canvas.width - player.width) {
                player.x = canvas.width - player.width;
                player.velX = 0;
            } else if (player.x <= 0) {
                player.x = 0;
                player.velX = 0;
            }

            // Ground collision
            if (player.y >= canvas.height - player.height) {
                player.y = canvas.height - player.height;
                player.jumping = false;
                player.velY = 0;
            }

            // Platform collision
            platforms.forEach(platform => {
                if (
                    player.x < platform.x + platform.width &&
                    player.x + player.width > platform.x &&
                    player.y + player.height > platform.y &&
                    player.y + player.height < platform.y + platform.height &&
                    player.velY >= 0
                ) {
                    player.jumping = false;
                    player.velY = 0;
                    player.y = platform.y - player.height;
                }
            });
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw player
            ctx.fillStyle = 'red';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw platforms
            ctx.fillStyle = 'black';
            platforms.forEach(platform => {
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
            });
        }

        let lastTime = 0;
        let accumulator = 0;

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;

            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            // Prevent huge catch-up jumps after tab switching/freezing
            if (deltaTime > 250) deltaTime = 250;

            accumulator += deltaTime;

            while (accumulator >= FRAME_TIME) {
                updateGame();
                accumulator -= FRAME_TIME;
            }

            drawGame();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
