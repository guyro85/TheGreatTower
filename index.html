<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Tower</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; }
        #gameCanvas { background-color: #87CEEB; display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const TARGET_FPS = 60;
        const FRAME_TIME = 1000 / TARGET_FPS;

        const gravity = 0.5;
        const friction = 0.88;
        const baseJump = -10;

        // Score & game state
        let score = 0;
        let gameOver = false;
        let speedMult = 1;
        let starTimer = 0; // frames of star-power remaining

        // Platform numbering
        let platformCounter = 0;

        // Bullets
        let bullets = [];

        function createEnemy(platform) {
            if (Math.random() > 0.05) return null;
            const roll = Math.random();
            const type = roll < 0.5 ? 1 : roll < 0.9 ? 2 : 3;
            return {
                type,
                offsetX: platform.width / 2 - 10,
                width: 20, height: 20,
                velX: type === 2 ? 1 : 0,
                shootTimer: 0, shootInterval: 120
            };
        }

        // Width logic: 20% narrow (55–80), 55% normal (90–110), 25% wide (140–185)
        function randomPlatformWidth() {
            const r = Math.random();
            if (r < 0.20) return 55 + Math.floor(Math.random() * 26);
            if (r < 0.75) return 90 + Math.floor(Math.random() * 21);
            return 140 + Math.floor(Math.random() * 46);
        }

        // Returns true if a platform at (x, y, w) overlaps any existing platform
        function overlapsExisting(x, y, w) {
            return platforms.some(p =>
                Math.abs(p.y - y) < 18 &&
                x < p.x + p.width + 4 &&
                x + w > p.x - 4
            );
        }

        // Find a non-overlapping x position for a given y and width
        function nonOverlapX(y, w) {
            for (let i = 0; i < 40; i++) {
                const x = Math.random() * Math.max(1, canvas.width - w);
                if (!overlapsExisting(x, y, w)) return x;
            }
            return Math.random() * Math.max(1, canvas.width - w);
        }

        function createPlatform(x, y, forcedWidth) {
            platformCounter++;
            const width = forcedWidth !== undefined ? forcedWidth : randomPlatformWidth();
            const p = {
                x, y, width, height: 10, number: platformCounter,
                standTimer: 0, isStoodOn: false, falling: false, fallSpeed: 0
            };
            // 6% of platforms move up/down (slow)
            p.moving = Math.random() < 0.06;
            p.moveDir = 1;
            p.moveSpeed = 0.6;
            p.moveRange = 55;
            p.moveOriginY = y;
            // 5% star powerup
            p.star = Math.random() < 0.05
                ? { offsetX: Math.floor(Math.random() * Math.max(1, width - 16)), width: 16, height: 16, collected: false }
                : null;
            // 4% spring (never on same platform as a star)
            p.spring = (!p.star && Math.random() < 0.04)
                ? { offsetX: Math.floor(Math.max(0, width / 2 - 8)), width: Math.min(16, width), height: 14 }
                : null;
            p.enemy = createEnemy(p);
            return p;
        }

        // Player
        let player = {
            x: canvas.width / 2,
            y: canvas.height - 150,
            width: 20, height: 20,
            speed: 8, velX: 0, velY: 0,
            jumping: false
        };

        // Platforms
        let platforms = [];
        function initPlatforms() {
            platformCounter = 0;
            platforms = [];
            // Safe floor: full width, no enemy, never collapses
            platforms.push({
                x: 0, y: canvas.height - 50,
                width: canvas.width, height: 10,
                number: 0,
                standTimer: 0, isStoodOn: false, falling: false, fallSpeed: 0,
                moving: false, moveDir: 1, moveSpeed: 0, moveRange: 0, moveOriginY: canvas.height - 50,
                safe: true, enemy: null, star: null, spring: null
            });
            for (let i = 1; i < 10; i++) {
                const y = canvas.height - (100 * i) - 50;
                const w = randomPlatformWidth();
                const x = nonOverlapX(y, w);
                platforms.push(createPlatform(x, y, w));
            }
        }
        initPlatforms();

        // Key Listener
        let keys = [];
        window.addEventListener('keydown', function(e) {
            keys[e.keyCode] = true;
            if ((e.keyCode === 32 || e.keyCode === 38) && !player.jumping) {
                player.jumping = true;
                player.velY = baseJump - Math.abs(player.velX) * 0.5;
            }
            if ((e.key === 'r' || e.key === 'R') && gameOver) {
                restartGame();
            }
        });

        window.addEventListener('keyup', function(e) {
            keys[e.keyCode] = false;
        });

        function restartGame() {
            score = 0;
            gameOver = false;
            speedMult = 1;
            starTimer = 0;
            bullets = [];
            player.x = canvas.width / 2;
            player.y = canvas.height - 150;
            player.velX = 0;
            player.velY = 0;
            player.jumping = false;
            initPlatforms();
        }

        function updateGame() {
            if (gameOver) return;

            if (keys[39]) player.velX = Math.min(player.velX + 1.5, player.speed);
            if (keys[37]) player.velX = Math.max(player.velX - 1.5, -player.speed);

            player.velX *= friction;
            player.velY += gravity;
            player.x += player.velX;
            player.y += player.velY;

            if (starTimer > 0) starTimer--;

            // Screen scroll
            if (player.y < canvas.height / 4) {
                const scrollAmount = Math.abs(player.velY);
                speedMult = Math.min(4, speedMult + scrollAmount * 0.015);
                score += Math.ceil(scrollAmount * speedMult * 0.5);
                player.y += scrollAmount;
                platforms.forEach(p => {
                    p.y += scrollAmount;
                    if (p.moving) p.moveOriginY += scrollAmount;
                });
                bullets.forEach(b => { b.y += scrollAmount; });
            }

            // Decay speed multiplier
            speedMult = Math.max(1, speedMult - 0.008);

            // Move up/down platforms
            platforms.forEach(platform => {
                if (!platform.moving || platform.falling) return;
                platform.y += platform.moveDir * platform.moveSpeed;
                if (Math.abs(platform.y - platform.moveOriginY) >= platform.moveRange) {
                    platform.moveDir *= -1;
                }
            });

            // Move falling platforms
            platforms.forEach(platform => {
                if (!platform.falling) return;
                platform.fallSpeed += 0.3;
                platform.y += platform.fallSpeed;
            });

            // Recycle any platform that exited the bottom
            platforms.forEach(platform => {
                if (platform.y <= canvas.height + 50) return;
                const newW = randomPlatformWidth();
                const newX = nonOverlapX(-10, newW);
                platformCounter++;
                platform.x = newX;
                platform.y = -10;
                platform.width = newW;
                platform.number = platformCounter;
                platform.standTimer = 0;
                platform.isStoodOn = false;
                platform.falling = false;
                platform.fallSpeed = 0;
                platform.safe = false;
                platform.moving = Math.random() < 0.06;
                platform.moveDir = 1;
                platform.moveSpeed = 0.6;
                platform.moveRange = 55;
                platform.moveOriginY = platform.y;
                platform.star = Math.random() < 0.05
                    ? { offsetX: Math.floor(Math.random() * Math.max(1, newW - 16)), width: 16, height: 16, collected: false }
                    : null;
                platform.spring = (!platform.star && Math.random() < 0.04)
                    ? { offsetX: Math.floor(Math.max(0, newW / 2 - 8)), width: Math.min(16, newW), height: 14 }
                    : null;
                platform.enemy = createEnemy(platform);
            });

            // Canvas edges: wall bounce
            if (player.x >= canvas.width - player.width) {
                player.x = canvas.width - player.width;
                player.velX = -Math.abs(player.velX) * 1.1;
            } else if (player.x <= 0) {
                player.x = 0;
                player.velX = Math.abs(player.velX) * 1.1;
            }
            player.velX = Math.max(-player.speed, Math.min(player.speed, player.velX));

            // Death: fell off bottom
            if (player.y >= canvas.height - player.height) {
                gameOver = true;
                return;
            }

            // Reset stood-on flags
            platforms.forEach(p => { p.isStoodOn = false; });

            // Platform collision
            platforms.forEach(platform => {
                if (platform.falling) return;
                const playerBottom = player.y + player.height;
                const prevPlayerBottom = playerBottom - player.velY;
                if (
                    player.x < platform.x + platform.width &&
                    player.x + player.width > platform.x &&
                    prevPlayerBottom <= platform.y &&
                    playerBottom >= platform.y &&
                    player.velY > 0
                ) {
                    // Spring check: if landing within the spring's x range, super-bounce
                    const sp = platform.spring;
                    if (sp) {
                        const sx = platform.x + sp.offsetX;
                        if (player.x + player.width > sx && player.x < sx + sp.width) {
                            player.jumping = true;
                            player.velY = -22;
                            player.y = platform.y - player.height;
                            return;
                        }
                    }
                    // Normal land
                    player.jumping = false;
                    player.velY = 0;
                    player.y = platform.y - player.height;
                    platform.isStoodOn = true;
                }
            });

            // Star collection
            platforms.forEach(platform => {
                const st = platform.star;
                if (!st || st.collected) return;
                const sx = platform.x + st.offsetX;
                const sy = platform.y - st.height;
                if (
                    player.x < sx + st.width &&
                    player.x + player.width > sx &&
                    player.y < sy + st.height &&
                    player.y + player.height > sy
                ) {
                    st.collected = true;
                    starTimer = 360; // 6 seconds at 60 fps
                }
            });

            // Stand timer: fall after 4 seconds (safe platform immune)
            platforms.forEach(platform => {
                if (platform.falling || platform.safe) return;
                if (platform.isStoodOn) {
                    platform.standTimer += FRAME_TIME;
                    if (platform.standTimer >= 4000) platform.falling = true;
                } else {
                    platform.standTimer = 0;
                }
            });

            updateEnemies();
            updateBullets();
        }

        function updateEnemies() {
            platforms.forEach(platform => {
                const e = platform.enemy;
                if (!e) return;

                // Type 2: move side to side within platform bounds
                if (e.type === 2) {
                    e.offsetX += e.velX;
                    if (e.offsetX <= 0)                          { e.offsetX = 0; e.velX = 1; }
                    if (e.offsetX + e.width >= platform.width)   { e.offsetX = platform.width - e.width; e.velX = -1; }
                }

                // Type 3: shoot toward player every shootInterval frames
                if (e.type === 3) {
                    e.shootTimer++;
                    if (e.shootTimer >= e.shootInterval) {
                        e.shootTimer = 0;
                        const ex = platform.x + e.offsetX + e.width / 2;
                        const ey = platform.y - e.height / 2;
                        const dx = (player.x + player.width / 2) - ex;
                        const dy = (player.y + player.height / 2) - ey;
                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                        bullets.push({ x: ex, y: ey, velX: dx / dist * 3, velY: dy / dist * 3, r: 4 });
                    }
                }

                // Collision: star power kills enemy; otherwise game over
                const ex = platform.x + e.offsetX;
                const ey = platform.y - e.height;
                if (!gameOver &&
                    player.x < ex + e.width &&
                    player.x + player.width > ex &&
                    player.y < ey + e.height &&
                    player.y + player.height > ey
                ) {
                    if (starTimer > 0) {
                        platform.enemy = null;
                    } else {
                        gameOver = true;
                    }
                }
            });
        }

        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.velX;
                b.y += b.velY;

                // Remove if off-screen
                if (b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) {
                    bullets.splice(i, 1);
                    continue;
                }

                // Collision: bullet touches player → game over
                if (!gameOver &&
                    player.x < b.x + b.r &&
                    player.x + player.width > b.x - b.r &&
                    player.y < b.y + b.r &&
                    player.y + player.height > b.y - b.r
                ) {
                    gameOver = true;
                    bullets.splice(i, 1);
                }
            }
        }

        // Draw a 5-pointed star centred at (cx, cy) with outer radius r
        function drawStarShape(cx, cy, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const angle = (i * Math.PI / 5) - Math.PI / 2;
                const radius = (i % 2 === 0) ? r : r * 0.4;
                const px = cx + radius * Math.cos(angle);
                const py = cy + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw platforms
            platforms.forEach(platform => {
                // Colour: falling=red, moving=steel-blue, normal=black
                ctx.fillStyle = platform.falling ? '#FF4500' : platform.moving ? '#2255AA' : 'black';
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);

                // Warning bar
                if (!platform.falling && platform.standTimer > 0) {
                    const pct = platform.standTimer / 4000;
                    ctx.fillStyle = pct < 0.5 ? '#FFA500' : '#FF4500';
                    ctx.fillRect(platform.x, platform.y - 4, platform.width * pct, 3);
                }

                // Floor label on multiples of 10
                if (platform.number % 10 === 0) {
                    ctx.save();
                    ctx.font = 'bold 9px Arial';
                    ctx.textAlign = 'center';
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = 'black';
                    ctx.fillStyle = 'white';
                    const label = 'FLOOR ' + platform.number;
                    const cx = platform.x + platform.width / 2;
                    ctx.strokeText(label, cx, platform.y + 8);
                    ctx.fillText(label, cx, platform.y + 8);
                    ctx.restore();
                }

                // Spring: green coil on top of platform
                if (platform.spring) {
                    const sp = platform.spring;
                    const sx = platform.x + sp.offsetX;
                    const sy = platform.y - sp.height;
                    ctx.fillStyle = '#22BB22';
                    ctx.fillRect(sx, sy + 4, sp.width, sp.height - 4);
                    ctx.fillStyle = '#004400';
                    ctx.fillRect(sx, sy, sp.width, 4);
                    ctx.strokeStyle = '#66FF66';
                    ctx.lineWidth = 1;
                    for (let li = 1; li <= 3; li++) {
                        const ly = sy + 4 + (li * (sp.height - 4) / 4);
                        ctx.beginPath();
                        ctx.moveTo(sx + 2, ly);
                        ctx.lineTo(sx + sp.width - 2, ly);
                        ctx.stroke();
                    }
                }

                // Star powerup: golden star floating above platform
                if (platform.star && !platform.star.collected) {
                    const st = platform.star;
                    const cx = platform.x + st.offsetX + st.width / 2;
                    const cy = platform.y - st.height / 2;
                    drawStarShape(cx, cy, 8, '#FFD700');
                }
            });

            // Draw enemies
            const enemyColors = { 1: '#8B0000', 2: '#CC4400', 3: '#6600CC' };
            platforms.forEach(platform => {
                const e = platform.enemy;
                if (!e) return;
                const ex = platform.x + e.offsetX;
                const ey = platform.y - e.height;
                ctx.fillStyle = enemyColors[e.type];
                ctx.fillRect(ex, ey, e.width, e.height);
                // Eyes
                ctx.fillStyle = 'white';
                ctx.fillRect(ex + 4, ey + 4, 4, 4);
                ctx.fillRect(ex + 12, ey + 4, 4, 4);
                ctx.fillStyle = 'black';
                ctx.fillRect(ex + 5, ey + 5, 2, 2);
                ctx.fillRect(ex + 13, ey + 5, 2, 2);
                // Type 3: gun barrel
                if (e.type === 3) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(ex + 7, ey + 14, 6, 6);
                }
            });

            // Draw bullets
            ctx.fillStyle = '#FF2200';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw player: flashes gold while star power is active
            ctx.fillStyle = (starTimer > 0 && Math.floor(starTimer / 6) % 2 === 0) ? '#FFD700' : 'red';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // HUD
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(5, 5, 165, starTimer > 0 ? 75 : 55);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Score: ' + score, 12, 26);
            ctx.font = '13px Arial';
            ctx.fillStyle = speedMult > 1.5 ? '#FFD700' : '#aaa';
            ctx.fillText('Speed \xd7' + speedMult.toFixed(1), 12, 48);
            if (starTimer > 0) {
                drawStarShape(22, 64, 8, '#FFD700');
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(Math.ceil(starTimer / 60) + 's', 36, 69);
            }

            // Game over overlay
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);
                ctx.font = '22px Arial';
                ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 15);
                ctx.font = '15px Arial';
                ctx.fillStyle = '#ccc';
                ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        let lastTime = 0;
        let accumulator = 0;

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            if (deltaTime > 250) deltaTime = 250;
            accumulator += deltaTime;
            while (accumulator >= FRAME_TIME) {
                updateGame();
                accumulator -= FRAME_TIME;
            }
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
